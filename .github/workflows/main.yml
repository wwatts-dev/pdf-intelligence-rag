name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js deprecation warning
      - uses: actions/checkout@v4
      
      # Updated to v5 to fix the Node.js deprecation warning
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pytest-asyncio and anyio which are required for FastAPI async tests
          # Fixed: added sentence-transformers and langchain to resolve the ImportError
          pip install pytest pytest-asyncio anyio httpx fastapi groq pypdf langchain langchain-huggingface langchain-community sentence-transformers faiss-cpu python-dotenv python-multipart
          
      - name: Run Tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # This ensures the runner sees the 'backend' folder as a package
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          ls -R  # This will show exactly where all project files are in the cloud
          pytest backend/tests/
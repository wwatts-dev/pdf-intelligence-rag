name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio anyio httpx fastapi groq pypdf langchain-huggingface langchain-community faiss-cpu python-dotenv python-multipart
          
      - name: Run Tests
        env:
          # This maps the GitHub Secret to an environment variable the code can read
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pytest backend/tests/